{% extends 'base.html' %}

{% block content %}

<div class="container mt-5 text-center">

  <div class="card p-5 shadow-lg">

    <h2 class="text-success">✅ Request Sent</h2>

    <p class="mt-3">
      Your request has been sent to  
      <strong>Dr. {{ doctor.doctor_name }}</strong>
    </p>

    <p>Please wait for doctor approval.</p>

    <div class="mt-4">
      <a href="{% url 'doctor_list' %}" class="btn btn-primary">
        🔙 Back to Doctors
      </a>
    </div>

  </div>

</div>

{% endblock %}
